<div class="container">
  <h1>Harry Potter Characters</h1>

  <div *ngIf="loading" class="loading">
    <mat-spinner></mat-spinner>
  </div>

  <div *ngIf="!loading" class="card-grid">
    <mat-card *ngFor="let character of characters" class="character-card" [routerLink]="['/character', character.id]">
      <img mat-card-image
           [src]="character.image || 'assets/placeholder.png'"
           [alt]="character.name">
      <mat-card-content>
        <h2>{{ character.name }}</h2>
        <p><strong>House:</strong> {{ character.house || 'Unknown' }}</p>
      </mat-card-content>
    </mat-card>
  </div>
</div>
